<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" width="900" height="480" role="img" aria-labelledby="t-wiring d-wiring">
  <title id="t-wiring">PCA9685 wiring diagram</title>
  <desc id="d-wiring">Wiring diagram for PCA9685 16-channel PWM driver showing single device connection and daisy-chain configuration with shared I2C bus.</desc>
  <defs>
    <style type="text/css"><![CDATA[
      .panel    { fill: #ffffff; }
      .box      { fill: #f4f6f8; stroke: #1a365d; stroke-width: 2; }
      .chip     { fill: #fef5e7; stroke: #c05621; stroke-width: 2; }
      .wire-pwr { stroke: #c53030; stroke-width: 2.5; fill: none; stroke-linecap: round; }
      .wire-gnd { stroke: #4a5568; stroke-width: 2.5; fill: none; stroke-linecap: round; }
      .wire-i2c { stroke: #2b6cb0; stroke-width: 2.5; fill: none; stroke-linecap: round; }
      .pullup   { fill: #ebf4ff; stroke: #2c5282; stroke-width: 1.5; }
      .output   { fill: #f0fff4; stroke: #276749; stroke-width: 1.5; }
      .head     { font-family: system-ui, sans-serif; font-size: 16px; font-weight: 600; fill: #1a365d; text-anchor: middle; }
      .title    { font-family: system-ui, sans-serif; font-size: 13px; font-weight: 600; fill: #1a365d; text-anchor: middle; }
      .titleL   { font-family: system-ui, sans-serif; font-size: 13px; font-weight: 600; fill: #1a365d; text-anchor: start; }
      .small    { font-family: system-ui, sans-serif; font-size: 11px; fill: #4a5568; text-anchor: middle; }
      .smallL   { font-family: system-ui, sans-serif; font-size: 11px; fill: #4a5568; text-anchor: start; }
      .pinL     { font-family: "DejaVu Sans Mono", Consolas, monospace; font-size: 12px; fill: #1a202c; text-anchor: start; }
      .legend   { font-family: system-ui, sans-serif; font-size: 11px; fill: #4a5568; }
    ]]></style>
    <marker id="ar-w" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 z" fill="#2b6cb0"/>
    </marker>
    <marker id="ar-pwr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 z" fill="#c53030"/>
    </marker>
    <marker id="ar-gnd" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 z" fill="#4a5568"/>
    </marker>
    <marker id="ar-out" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 z" fill="#276749"/>
    </marker>
  </defs>

  <rect class="panel" width="900" height="480"/>

  <!-- ============================================================ -->
  <!-- SECTION 1: Single PCA9685  (y = 0..220)                     -->
  <!-- ============================================================ -->
  <text class="head" x="450" y="24">Single PCA9685</text>
  <text class="small" x="450" y="40">Basic wiring with I2C pull-ups and 16-channel PWM output</text>

  <!-- MCU box -->
  <rect class="box" x="30" y="60" width="130" height="150" rx="6"/>
  <text class="title" x="95" y="82">MCU</text>
  <text class="pinL" x="44" y="104">3.3V</text>
  <text class="pinL" x="44" y="124">GND</text>
  <text class="pinL" x="44" y="148">SCL</text>
  <text class="pinL" x="44" y="168">SDA</text>
  <text class="pinL" x="44" y="192">GPIO</text>

  <!-- Power wires MCU -> PCA9685 -->
  <line class="wire-pwr" x1="160" y1="100" x2="330" y2="100" marker-end="url(#ar-pwr)"/>
  <line class="wire-gnd" x1="160" y1="120" x2="330" y2="120" marker-end="url(#ar-gnd)"/>

  <!-- I2C wires MCU -> bus trunk -->
  <line class="wire-i2c" x1="160" y1="144" x2="220" y2="144"/>
  <line class="wire-i2c" x1="160" y1="164" x2="220" y2="164"/>

  <!-- I2C bus trunk (vertical segment) -->
  <line class="wire-i2c" x1="220" y1="144" x2="220" y2="72"/>
  <line class="wire-i2c" x1="240" y1="164" x2="240" y2="72"/>

  <!-- Pull-up resistors on SCL -->
  <rect class="pullup" x="208" y="58" width="24" height="14" rx="3"/>
  <text class="smallL" x="200" y="54">4.7k&#8486;</text>
  <line class="wire-pwr" x1="220" y1="58" x2="220" y2="48"/>
  <text class="pinL" x="210" y="46" style="font-size:10px">3.3V</text>

  <!-- Pull-up resistors on SDA -->
  <rect class="pullup" x="228" y="58" width="24" height="14" rx="3"/>
  <text class="smallL" x="256" y="54">4.7k&#8486;</text>
  <line class="wire-pwr" x1="240" y1="58" x2="240" y2="48"/>

  <!-- I2C wires from trunk to chip -->
  <line class="wire-i2c" x1="220" y1="144" x2="330" y2="144" marker-end="url(#ar-w)"/>
  <line class="wire-i2c" x1="240" y1="164" x2="330" y2="164" marker-end="url(#ar-w)"/>

  <!-- OE wire MCU -> PCA9685 -->
  <polyline class="wire-i2c" points="160,188 270,188 270,184 330,184" marker-end="url(#ar-w)"/>

  <!-- PCA9685 chip -->
  <rect class="chip" x="330" y="60" width="280" height="150" rx="8"/>
  <text class="title" x="470" y="82">PCA9685</text>
  <text class="small" x="470" y="96">I2C addr 0x40</text>

  <!-- Pin labels on chip left edge -->
  <text class="pinL" x="338" y="118" style="font-size:11px">VDD</text>
  <text class="pinL" x="338" y="134" style="font-size:11px">GND</text>
  <text class="pinL" x="338" y="150" style="font-size:11px">SCL</text>
  <text class="pinL" x="338" y="166" style="font-size:11px">SDA</text>
  <text class="pinL" x="338" y="186" style="font-size:11px">OE</text>
  <text class="smallL" x="338" y="200" style="font-size:9px">(active-low)</text>

  <!-- Outputs arrow from chip right edge -->
  <line stroke="#276749" stroke-width="2.5" fill="none" stroke-linecap="round" x1="610" y1="135" x2="660" y2="135" marker-end="url(#ar-out)"/>

  <!-- Output box -->
  <rect class="output" x="660" y="68" width="210" height="142" rx="6"/>
  <text class="title" x="765" y="90" style="fill:#276749">OUT0..OUT15</text>
  <text class="small" x="765" y="108">16-ch PWM output</text>
  <text class="smallL" x="674" y="130">&#8226; LEDs (with R<tspan style="font-size:9px" dy="2">lim</tspan><tspan dy="-2">)</tspan></text>
  <text class="smallL" x="674" y="148">&#8226; Servos (1..2 ms pulse)</text>
  <text class="smallL" x="674" y="166">&#8226; Motor drivers</text>
  <text class="smallL" x="674" y="184">&#8226; 12-bit resolution (0..4095)</text>
  <text class="smallL" x="674" y="200">&#8226; Totem-pole or open-drain</text>

  <!-- ============================================================ -->
  <!-- SECTION 2: Daisy-chain  (y = 230..440)                      -->
  <!-- ============================================================ -->
  <line stroke="#cbd5e0" stroke-width="1" x1="20" y1="228" x2="880" y2="228"/>
  <text class="head" x="450" y="252">Daisy-chain (shared I2C bus)</text>
  <text class="small" x="450" y="268">Multiple PCA9685 on same SCL/SDA with unique addresses via A0..A5</text>

  <!-- MCU box (bottom section) -->
  <rect class="box" x="30" y="286" width="130" height="100" rx="6"/>
  <text class="title" x="95" y="308">MCU</text>
  <text class="pinL" x="44" y="330">SCL</text>
  <text class="pinL" x="44" y="354">SDA</text>
  <text class="pinL" x="44" y="378">3.3V / GND</text>

  <!-- I2C wires from MCU to bus trunk -->
  <line class="wire-i2c" x1="160" y1="326" x2="260" y2="326"/>
  <line class="wire-i2c" x1="160" y1="350" x2="280" y2="350"/>

  <!-- Bus trunk vertical -->
  <line class="wire-i2c" x1="260" y1="290" x2="260" y2="398"/>
  <line class="wire-i2c" x1="280" y1="290" x2="280" y2="398"/>

  <!-- Shared pull-ups on trunk (SCL) -->
  <rect class="pullup" x="248" y="278" width="24" height="12" rx="3"/>
  <line class="wire-pwr" x1="260" y1="278" x2="260" y2="272"/>
  <text class="smallL" x="236" y="270">4.7k&#8486;</text>

  <!-- Shared pull-ups on trunk (SDA) -->
  <rect class="pullup" x="268" y="278" width="24" height="12" rx="3"/>
  <line class="wire-pwr" x1="280" y1="278" x2="280" y2="272"/>
  <text class="smallL" x="296" y="270">4.7k&#8486;</text>

  <!-- 3.3V label above pull-ups -->
  <text class="pinL" x="252" y="264" style="font-size:10px">3.3V</text>

  <!-- Branch to PCA9685 #1 (top) -->
  <line class="wire-i2c" x1="260" y1="316" x2="370" y2="316" marker-end="url(#ar-w)"/>
  <line class="wire-i2c" x1="280" y1="336" x2="370" y2="336" marker-end="url(#ar-w)"/>

  <!-- Branch to PCA9685 #2 (bottom) -->
  <line class="wire-i2c" x1="260" y1="388" x2="370" y2="388" marker-end="url(#ar-w)"/>
  <line class="wire-i2c" x1="280" y1="408" x2="370" y2="408" marker-end="url(#ar-w)"/>

  <!-- Power bus (simplified) -->
  <line class="wire-pwr" x1="160" y1="374" x2="200" y2="374"/>
  <line class="wire-pwr" x1="200" y1="304" x2="200" y2="400"/>
  <line class="wire-pwr" x1="200" y1="306" x2="370" y2="306"/>
  <line class="wire-pwr" x1="200" y1="378" x2="370" y2="378"/>

  <!-- PCA9685 #1 -->
  <rect class="chip" x="370" y="294" width="240" height="56" rx="6"/>
  <text class="title" x="490" y="316">PCA9685 #1</text>
  <text class="small" x="490" y="334">A0=0 &#8594; addr 0x40</text>
  <text class="pinL" x="378" y="312" style="font-size:10px">VDD</text>
  <text class="pinL" x="378" y="346" style="font-size:10px">SCL/SDA</text>

  <!-- PCA9685 #1 outputs -->
  <line stroke="#276749" stroke-width="2.5" fill="none" stroke-linecap="round" x1="610" y1="322" x2="650" y2="322" marker-end="url(#ar-out)"/>
  <rect class="output" x="650" y="300" width="170" height="44" rx="5"/>
  <text class="title" x="735" y="318" style="fill:#276749">OUT0..OUT15</text>
  <text class="small" x="735" y="334">16-ch PWM</text>

  <!-- PCA9685 #2 -->
  <rect class="chip" x="370" y="366" width="240" height="56" rx="6"/>
  <text class="title" x="490" y="388">PCA9685 #2</text>
  <text class="small" x="490" y="406">A0=1 &#8594; addr 0x41</text>
  <text class="pinL" x="378" y="384" style="font-size:10px">VDD</text>
  <text class="pinL" x="378" y="418" style="font-size:10px">SCL/SDA</text>

  <!-- PCA9685 #2 outputs -->
  <line stroke="#276749" stroke-width="2.5" fill="none" stroke-linecap="round" x1="610" y1="394" x2="650" y2="394" marker-end="url(#ar-out)"/>
  <rect class="output" x="650" y="372" width="170" height="44" rx="5"/>
  <text class="title" x="735" y="390" style="fill:#276749">OUT16..OUT31</text>
  <text class="small" x="735" y="406">16-ch PWM</text>

  <!-- Dots on bus trunk to show extensibility -->
  <text class="title" x="270" y="430">&#8942;</text>
  <text class="smallL" x="290" y="432">more devices</text>

  <!-- ============================================================ -->
  <!-- LEGEND  (y = 450..478)                                       -->
  <!-- ============================================================ -->
  <line stroke="#cbd5e0" stroke-width="1" x1="20" y1="446" x2="880" y2="446"/>
  <g transform="translate(30, 468)">
    <text class="titleL" x="0" y="0">Legend</text>

    <line class="wire-pwr" x1="70" y1="-3" x2="96" y2="-3"/>
    <text class="legend" x="102" y="1">3.3V power</text>

    <line class="wire-gnd" x1="186" y1="-3" x2="212" y2="-3"/>
    <text class="legend" x="218" y="1">GND</text>

    <line class="wire-i2c" x1="260" y1="-3" x2="286" y2="-3" marker-end="url(#ar-w)"/>
    <text class="legend" x="292" y="1">I2C (SCL/SDA)</text>

    <rect class="pullup" x="388" y="-9" width="14" height="12" rx="2"/>
    <text class="legend" x="408" y="1">Pull-up R</text>

    <rect class="output" x="474" y="-9" width="14" height="12" rx="2"/>
    <text class="legend" x="494" y="1">PWM output</text>

    <rect class="chip" x="572" y="-9" width="14" height="12" rx="2"/>
    <text class="legend" x="592" y="1">PCA9685 IC</text>

    <rect class="box" x="664" y="-9" width="14" height="12" rx="2"/>
    <text class="legend" x="684" y="1">MCU / controller</text>
  </g>
</svg>
