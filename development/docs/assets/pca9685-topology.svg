<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 580" width="880" height="580" role="img" aria-labelledby="t-pca d-pca">
  <title id="t-pca">PCA9685 16-channel PWM topology and 50 Hz servo timing</title>
  <desc id="d-pca">I2C-controlled PCA9685 generates 16 independent 12-bit PWMs at a global frequency 24..1526 Hz from its 25 MHz internal oscillator. The bottom panel shows how a 50 Hz servo frame (20 ms period) carries pulses of 1.0 / 1.5 / 2.0 ms to command 0 / 90 / 180 degrees on a typical hobby servo.</desc>
  <defs>
    <style type="text/css"><![CDATA[
      .panel    { fill: #ffffff; }
      .panelL   { fill: #ffffff; stroke: #1a365d; stroke-width: 2; }
      .chip     { fill: #fef5e7; stroke: #c05621; stroke-width: 2; }
      .ch       { fill: #ebf4ff; stroke: #2c5282; stroke-width: 1.6; }
      .box      { fill: #f4f6f8; stroke: #1a365d; stroke-width: 2; }
      .wire-i2c { stroke: #2b6cb0; stroke-width: 2.5; fill: none; stroke-linecap: round; }
      .axis     { stroke: #1a365d; stroke-width: 1.5; fill: none; }
      .grid     { stroke: #cbd5e0; stroke-width: 1; stroke-dasharray: 4 4; }
      .pwm0     { stroke: #c05621; stroke-width: 2.5; fill: none; }
      .pwm90    { stroke: #2c5282; stroke-width: 2.5; fill: none; }
      .pwm180   { stroke: #276749; stroke-width: 2.5; fill: none; }
      .head     { font-family: system-ui, sans-serif; font-size: 16px; font-weight: 600; fill: #1a365d; text-anchor: middle; }
      .title    { font-family: system-ui, sans-serif; font-size: 13px; font-weight: 600; fill: #1a365d; text-anchor: middle; }
      .titleL   { font-family: system-ui, sans-serif; font-size: 13px; font-weight: 600; fill: #1a365d; text-anchor: start; }
      .small    { font-family: system-ui, sans-serif; font-size: 11px; fill: #4a5568; text-anchor: middle; }
      .smallL   { font-family: system-ui, sans-serif; font-size: 11px; fill: #4a5568; text-anchor: start; }
      .pin      { font-family: "DejaVu Sans Mono", Consolas, monospace; font-size: 11px; fill: #1a202c; text-anchor: middle; }
      .pinL     { font-family: "DejaVu Sans Mono", Consolas, monospace; font-size: 11px; fill: #1a202c; text-anchor: start; }
      .legend   { font-family: system-ui, sans-serif; font-size: 11px; fill: #4a5568; }
    ]]></style>
    <marker id="ar-pca" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 z" fill="#2b6cb0"/>
    </marker>
  </defs>
  <rect class="panel" width="880" height="580"/>

  <text class="head"  x="440" y="26">PCA9685 - 16-channel 12-bit PWM, 24..1526 Hz</text>
  <text class="small" x="440" y="44">I2C device address 0x40..0x7F (A0..A5 + ALLCALL/SUBADRn). Daisy-chainable up to 992 outputs total.</text>

  <!-- Section 1: I2C + chip + outputs (y=66..240) -->
  <rect class="box" x="30" y="80" width="120" height="120" rx="6"/>
  <text class="title" x="90" y="102">MCU I2C</text>
  <text class="pin"   x="90" y="124">SDA</text>
  <text class="pin"   x="90" y="142">SCL</text>
  <text class="pin"   x="90" y="160">3V3</text>
  <text class="pin"   x="90" y="178">GND</text>

  <!-- I2C wires -->
  <line class="wire-i2c" x1="150" y1="130" x2="200" y2="130" marker-end="url(#ar-pca)"/>
  <line class="wire-i2c" x1="150" y1="148" x2="200" y2="148" marker-end="url(#ar-pca)"/>
  <text class="small" x="175" y="124">SDA</text>
  <text class="small" x="175" y="166">SCL</text>

  <!-- Chip body -->
  <rect class="chip" x="200" y="70" width="450" height="170" rx="10"/>
  <text class="head"  x="425" y="94">PCA9685</text>
  <text class="small" x="425" y="112">25 MHz internal oscillator (or external CLKIN) &#183; prescaler &#183; 12-bit on/off counters</text>

  <!-- 16 PWM channels in 2 rows of 8 -->
  <g>
    <rect class="ch" x="216" y="128" width="46" height="40" rx="4"/><text class="title" x="239" y="152">0</text>
    <rect class="ch" x="270" y="128" width="46" height="40" rx="4"/><text class="title" x="293" y="152">1</text>
    <rect class="ch" x="324" y="128" width="46" height="40" rx="4"/><text class="title" x="347" y="152">2</text>
    <rect class="ch" x="378" y="128" width="46" height="40" rx="4"/><text class="title" x="401" y="152">3</text>
    <rect class="ch" x="432" y="128" width="46" height="40" rx="4"/><text class="title" x="455" y="152">4</text>
    <rect class="ch" x="486" y="128" width="46" height="40" rx="4"/><text class="title" x="509" y="152">5</text>
    <rect class="ch" x="540" y="128" width="46" height="40" rx="4"/><text class="title" x="563" y="152">6</text>
    <rect class="ch" x="594" y="128" width="46" height="40" rx="4"/><text class="title" x="617" y="152">7</text>

    <rect class="ch" x="216" y="180" width="46" height="40" rx="4"/><text class="title" x="239" y="204">8</text>
    <rect class="ch" x="270" y="180" width="46" height="40" rx="4"/><text class="title" x="293" y="204">9</text>
    <rect class="ch" x="324" y="180" width="46" height="40" rx="4"/><text class="title" x="347" y="204">10</text>
    <rect class="ch" x="378" y="180" width="46" height="40" rx="4"/><text class="title" x="401" y="204">11</text>
    <rect class="ch" x="432" y="180" width="46" height="40" rx="4"/><text class="title" x="455" y="204">12</text>
    <rect class="ch" x="486" y="180" width="46" height="40" rx="4"/><text class="title" x="509" y="204">13</text>
    <rect class="ch" x="540" y="180" width="46" height="40" rx="4"/><text class="title" x="563" y="204">14</text>
    <rect class="ch" x="594" y="180" width="46" height="40" rx="4"/><text class="title" x="617" y="204">15</text>
  </g>

  <!-- PWM output panel (right) -->
  <rect class="box" x="680" y="80" width="170" height="160" rx="6"/>
  <text class="title" x="765" y="102">PWM outputs</text>
  <text class="smallL" x="694" y="122">PWM0 .. PWM15</text>
  <text class="smallL" x="694" y="138">12-bit (0..4095)</text>
  <text class="smallL" x="694" y="154">phase-shiftable</text>
  <text class="smallL" x="694" y="170">totem-pole or open-drain</text>
  <text class="smallL" x="694" y="186">(SetOutputDriverMode)</text>
  <text class="smallL" x="694" y="202">"Full ON" / "Full OFF"</text>
  <text class="smallL" x="694" y="218">(no PWM, fast)</text>
  <line class="wire-i2c" x1="650" y1="160" x2="680" y2="160" marker-end="url(#ar-pca)"/>

  <!-- I2C address selector panel (left, below MCU I2C) -->
  <rect class="box" x="30" y="260" width="240" height="120" rx="6"/>
  <text class="title" x="150" y="282">I2C address selector</text>
  <text class="smallL" x="44" y="302">Base = 0x40</text>
  <text class="pinL"   x="44" y="320">A0..A5 -&gt; 0x40 .. 0x7F</text>
  <text class="smallL" x="44" y="338">ALLCALL = 0x70 (default)</text>
  <text class="smallL" x="44" y="356">3 SUBADR addresses</text>
  <text class="smallL" x="44" y="374">-&gt; up to 62 chips per I2C bus</text>

  <!-- Section 2: Servo waveforms (y=260..480) -->
  <rect class="panelL" x="290" y="260" width="560" height="240" rx="6"/>
  <text class="title" x="570" y="280">Servo waveforms at 50 Hz frame rate (20 ms period)</text>
  <text class="small" x="570" y="298">A common application: hobby servos use ~1.0 ms (0&#176;), ~1.5 ms (90&#176;), ~2.0 ms (180&#176;) pulses.</text>

  <!--
    Plot area: x=320..830 (510 px = 20 ms), y=320..470.
    1 ms = 25.5 px; 0.5 ms = 12.75 px.
    Pulse widths in px:
      0 deg   pulse: 1.0 ms = 25 px (rounded)
      90 deg  pulse: 1.5 ms = 38 px
      180 deg pulse: 2.0 ms = 51 px
    3 separate stacked rows for the three pulse waveforms (each row 40 px tall).
    Row 0 deg : y=320..360, axis at y=360
    Row 90 deg: y=380..420, axis at y=420
    Row 180deg: y=440..480, axis at y=480
  -->

  <!-- Shared x-axis tick gridlines (vertical dashed) -->
  <line class="grid" x1="345" y1="318" x2="345" y2="480"/> <!-- 1 ms -->
  <line class="grid" x1="358" y1="318" x2="358" y2="480"/> <!-- 1.5 ms -->
  <line class="grid" x1="371" y1="318" x2="371" y2="480"/> <!-- 2 ms -->
  <line class="grid" x1="575" y1="318" x2="575" y2="480"/> <!-- 10 ms -->

  <!-- Row 0 deg (red) -->
  <line class="axis" x1="320" y1="360" x2="830" y2="360"/>
  <text class="smallL" fill="#c05621" x="320" y="316">0&#176; - 1.0 ms HIGH (~ duty 5%)</text>
  <path class="pwm0" d="M 320 360 L 320 332 L 345 332 L 345 360 L 830 360"/>

  <!-- Row 90 deg (blue) -->
  <line class="axis" x1="320" y1="420" x2="830" y2="420"/>
  <text class="smallL" fill="#2c5282" x="320" y="376">90&#176; - 1.5 ms HIGH (~ duty 7.5%)</text>
  <path class="pwm90" d="M 320 420 L 320 392 L 358 392 L 358 420 L 830 420"/>

  <!-- Row 180 deg (green) -->
  <line class="axis" x1="320" y1="480" x2="830" y2="480"/>
  <text class="smallL" fill="#276749" x="320" y="436">180&#176; - 2.0 ms HIGH (~ duty 10%)</text>
  <path class="pwm180" d="M 320 480 L 320 452 L 371 452 L 371 480 L 830 480"/>

  <!-- X-axis tick labels under bottom row (compact tick markers, descriptions in legend) -->
  <text class="small" x="320" y="494">0</text>
  <text class="small" x="358" y="494">1.5 ms</text>
  <text class="small" x="575" y="494">10 ms</text>
  <text class="small" x="830" y="494">20 ms</text>

  <!-- Bottom legend in its own row -->
  <g transform="translate(30, 530)">
    <text class="titleL" x="0" y="0" fill="#1a365d">Legend</text>
    <rect class="ch" x="80"  y="-10" width="14" height="14"/>
    <text class="legend" x="100" y="0">PWM channel (CHn drives PWMn output)</text>
    <line class="wire-i2c" x1="380" y1="-3" x2="404" y2="-3" marker-end="url(#ar-pca)"/>
    <text class="legend" x="412" y="0">I2C control</text>
    <text class="legend" x="490" y="0">12-bit resolution = 4096 ticks per period (any frequency)</text>
  </g>
</svg>
